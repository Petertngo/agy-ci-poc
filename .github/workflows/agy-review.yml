name: agy-ci-poc
on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  agy-review:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install agy
        run: |
          echo "=== Installing agy ==="
          brew install antigravity-cli
          echo "=== agy version ==="
          agy --version

      - name: Extract PR body
        run: |
          jq -r '.pull_request.body // ""' "${{ github.event_path }}" > /tmp/pr_body.md
          echo "=== PR Body ==="
          cat /tmp/pr_body.md

      - name: Run agy with PR body
        id: agy_run
        env:
          AGY_ACCESS_TOKEN: ${{ secrets.AGY_ACCESS_TOKEN }}
        run: |
          echo "=== agy execution ==="
          agy --print --model gemini-3.0-pro --prompt /tmp/pr_body.md 2>&1

      - name: Check for executed commands
        run: |
          echo "=== Checking for command output ==="
          for f in /tmp/ci_proof1.txt /tmp/ci_proof2.txt; do
            if [ -f "$f" ]; then
              echo "EXECUTED: $f → $(cat $f)"
            else
              echo "NOT FOUND: $f"
            fi
          done

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agy-ci-evidence
          path: |
            /tmp/ci_proof*.txt
            /tmp/pr_body.md
          if-no-files-found: warn
