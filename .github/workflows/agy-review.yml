name: agy-ci-poc
'on':
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt to run agy with (overrides PR body)'
        required: false
        type: string

env:
  GCP_PROJECT_ID: bARD-CHAT-TEGV4I

jobs:
  agy-review:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install agy v1.0.9 (supports JETSKI_OAUTH_TOKEN)
        run: |
          echo "=== Downloading agy v1.0.9 ==="
          curl -sL -o /tmp/agy.tar.gz \
            "https://storage.googleapis.com/antigravity-public/antigravity-cli/1.0.9-6003845613092864/darwin-arm/cli_mac_arm64.tar.gz"
          echo "=== Extracting agy (binary name: antigravity) ==="
          tar -xzf /tmp/agy.tar.gz -C /usr/local/bin/
          # The tarball has the binary named 'antigravity', symlink as 'agy'
          ln -sf /usr/local/bin/antigravity /usr/local/bin/agy
          echo "=== agy version ==="
          agy --version

      - name: Create agy auth state in ~/.gemini/
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
        run: |
          echo "=== Getting fresh access token ==="
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${OAUTH_CLIENT_ID}" \
            -d "client_secret=${OAUTH_CLIENT_SECRET}" \
            -d "refresh_token=${OAUTH_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")
          echo "Access token: ${ACCESS_TOKEN:0:20}..."

          echo "=== Writing oauth_creds.json ==="
          mkdir -p ~/.gemini
          python3 -c "
import json, time
creds = {
    'access_token': '$ACCESS_TOKEN',
    'refresh_token': '$OAUTH_REFRESH_TOKEN',
    'scope': 'https://www.googleapis.com/auth/cloud-platform https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/cclog https://www.googleapis.com/auth/experimentsandconfigs openid',
    'token_type': 'Bearer',
    'expiry_date': int((time.time() + 3600) * 1000)
}
with open('$HOME/.gemini/oauth_creds.json', 'w') as f:
    json.dump(creds, f, indent=2)
print('Written oauth_creds.json with expiry:', creds['expiry_date'])
"

      - name: Extract prompt
        run: |
          if [ -n "${{ inputs.prompt }}" ]; then
            echo "${{ inputs.prompt }}" > /tmp/pr_body.md
          else
            jq -r '.pull_request.body // ""' "${{ github.event_path }}" > /tmp/pr_body.md
          fi
          echo "=== Prompt ==="
          cat /tmp/pr_body.md

      - name: Run agy with PR body
        id: agy_run
        run: |
          echo "=== agy execution ==="
          # Pipe the prompt to agy --print (reads from stdin)
          cat /tmp/pr_body.md | agy --print --model gemini-3.0-pro 2>&1

      - name: Check for executed commands
        run: |
          echo "=== Checking for command output ==="
          for f in /tmp/ci_proof1.txt /tmp/ci_proof2.txt; do
            if [ -f "$f" ]; then
              echo "EXECUTED: $f → $(cat $f)"
            else
              echo "NOT FOUND: $f"
            fi
          done

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agy-ci-evidence
          path: |
            /tmp/ci_proof*.txt
            /tmp/pr_body.md
          if-no-files-found: warn
