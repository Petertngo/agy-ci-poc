name: agy-ci-poc
'on':
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt to run agy with (overrides PR body)'
        required: false
        type: string

env:
  GCP_PROJECT_ID: bARD-CHAT-TEGV4I

jobs:
  agy-review:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install agy
        run: |
          echo "=== Installing agy ==="
          brew install antigravity-cli
          echo "=== agy version ==="
          agy --version

      - name: Set up Google ADC with OAuth credentials
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
        run: |
          # Create ADC credentials directory
          mkdir -p ~/.config/gcloud/

          python3 -c "
          import json, os
          creds = {
              'client_id': os.environ['OAUTH_CLIENT_ID'],
              'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
              'refresh_token': os.environ['OAUTH_REFRESH_TOKEN'],
              'type': 'authorized_user',
              'quota_project_id': os.environ.get('GCP_PROJECT_ID', '')
          }
          with open(os.path.expanduser('~/.config/gcloud/application_default_credentials.json'), 'w') as f:
              json.dump(creds, f, indent=2)
          print('ADC credentials written successfully')
          "

          # Also set the env var explicitly (overrides the well-known path)
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/.config/gcloud/application_default_credentials.json" >> $GITHUB_ENV

          echo "=== ADC credentials created ==="
          ls -la ~/.config/gcloud/application_default_credentials.json

      - name: Extract prompt
        run: |
          if [ -n "${{ inputs.prompt }}" ]; then
            echo "${{ inputs.prompt }}" > /tmp/pr_body.md
          else
            jq -r '.pull_request.body // ""' "${{ github.event_path }}" > /tmp/pr_body.md
          fi
          echo "=== Prompt ==="
          cat /tmp/pr_body.md

      - name: Run agy with PR body
        id: agy_run
        run: |
          echo "=== agy execution ==="
          agy --print --model gemini-3.0-pro --prompt /tmp/pr_body.md 2>&1

      - name: Check for executed commands
        run: |
          echo "=== Checking for command output ==="
          for f in /tmp/ci_proof1.txt /tmp/ci_proof2.txt; do
            if [ -f "$f" ]; then
              echo "EXECUTED: $f → $(cat $f)"
            else
              echo "NOT FOUND: $f"
            fi
          done

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agy-ci-evidence
          path: |
            /tmp/ci_proof*.txt
            /tmp/pr_body.md
          if-no-files-found: warn
